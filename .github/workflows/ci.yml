name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform Init (No Backend)
        run: terraform -chdir=terraform init -backend=false

      - name: Terraform Format Check
        run: terraform -chdir=terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform -chdir=terraform validate

  ui-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install UI Dependencies
        run: python -m pip install -r ui/requirements.txt

      - name: Run UI Unit Tests
        run: python -m unittest discover -s ui/tests

  local-static-suites:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Test Dependencies
        run: python -m pip install pyyaml

      - name: Static Gateway Suite
        run: ./scripts/tests/run.sh static-gateway

      - name: Dashboard JSON Suite
        run: ./scripts/tests/run.sh dashboard-json

      - name: DNS Helper Local Suite
        run: ./scripts/tests/run.sh dns-helper-local
