---
- name: Base OS configuration
  hosts: all
  gather_facts: true
  any_errors_fatal: true
  tags: [common]
  pre_tasks:
    - name: Derive headscale_url from base_domain when not explicitly set
      ansible.builtin.set_fact:
        headscale_url: "https://{{ headscale_subdomain | default('headscale') }}.{{ base_domain }}"
      when:
        - base_domain is defined
        - base_domain | length > 0
        - headscale_url is not defined or (headscale_url | trim) == '' or 'sslip.io' in headscale_url

    - name: Auto-enable letsencrypt when base_domain provides a real DNS name
      # Defaults to letsencrypt for real DNS names unless an environment opts
      # out with headscale_tls_mode_auto: false.
      ansible.builtin.set_fact:
        headscale_tls_mode: letsencrypt
      when:
        - base_domain is defined
        - base_domain | length > 0
        - headscale_tls_mode_auto | default(true) | bool
        - (headscale_tls_mode | default('internal') | trim) == 'internal'

    - name: Pin Headscale FQDN in /etc/hosts for reliable Tailscale bootstrap
      # Avoids dependency on external DNS propagation during provisioning.
      # Always use the public IP (tf_public_ip) so that this entry remains valid
      # even when Ansible is running over Tailscale (ansible_host would be the
      # Tailscale IP, which does not exist yet when tailscaled is bootstrapping).
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: "{{ headscale_subdomain | default('headscale') }}\\.{{ base_domain }}"
        line: "{{ hostvars['control-vm']['tf_public_ip'] | default(hostvars['control-vm']['ansible_host']) }} {{ headscale_subdomain | default('headscale') }}.{{ base_domain }}"
        state: present
      when:
        - base_domain is defined
        - base_domain | length > 0
        - "'control-vm' in hostvars"
        - (hostvars['control-vm']['tf_public_ip'] | default(hostvars['control-vm']['ansible_host']) | default('')) != ''

    - name: Validate service_catalog schema
      ansible.builtin.assert:
        that:
          - service_catalog is mapping
        fail_msg: service_catalog must be a mapping (service name -> config object).
      run_once: true
      delegate_to: localhost
      become: false

    - name: Validate service_catalog entries
      ansible.builtin.assert:
        that:
          - item.value is mapping
          - (item.value.runtime | default('ansible')) in ['docker', 'ansible', 'plain']
          - (item.value.visibility | default('internal')) in ['internal', 'external', 'both']
          - ((item.value.visibility | default('internal')) not in ['internal', 'both']) or ((item.value.internal_alias | default('') | trim) != '')
          - ((item.value.visibility | default('internal')) not in ['external', 'both']) or ((item.value.external_subdomain | default('') | trim) != '')
        fail_msg: >-
          Invalid service_catalog entry for {{ item.key }}. Expected runtime=docker|ansible|plain,
          visibility=internal|external|both, and alias/subdomain fields for selected visibility.
      loop: "{{ service_catalog | default({}) | dict2items }}"
      run_once: true
      delegate_to: localhost
      become: false
  roles:
    - common

- name: Headscale control plane
  hosts: control
  gather_facts: true
  tags: [headscale]
  roles:
    - headscale

# Back up control-plane state (including /opt/caddy/data with the TLS cert) immediately
# after Headscale and Caddy are running, before any downstream plays run.
# This ensures that even if tailscale/monitoring/gateway plays fail, the LE cert is
# already snapshotted so the next full redeploy can restore it and avoid hitting the
# Let's Encrypt rate limit (5 certs per 7 days per exact hostname).
- name: Backup control plane immediately after Headscale role
  hosts: control
  gather_facts: true
  tags: [headscale, backup]
  roles:
    - backup

- name: Join tailnet via Headscale
  hosts: all
  gather_facts: true
  tags: [tailscale]
  roles:
    - tailscale

- name: Rebind Headplane to control tailnet IP
  hosts: control
  gather_facts: false
  tags: [headscale, tailscale]
  vars:
    headplane_rebind_image: "{{ headplane_image | default('ghcr.io/tale/headplane:latest') }}"
    headplane_rebind_port: 3000
  tasks:
    - name: Determine local Tailscale IPv4 for Headplane
      ansible.builtin.command:
        argv: ["sh", "-c", "tailscale ip -4 | head -n1"]
      register: _headplane_tailscale_ip
      changed_when: false
      when: headplane_enabled | default(true)

    - name: Fail if Headplane tailnet bind IP is unavailable
      ansible.builtin.assert:
        that:
          - (_headplane_tailscale_ip.stdout | default('') | trim) != ''
        fail_msg: "Headplane tailnet bind requires a control-node Tailscale IPv4 address."
      when: headplane_enabled | default(true)

    - name: Re-render Headplane config for the control tailnet IP
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../roles/headscale/templates/headplane-config.yaml.j2"
        dest: /opt/headplane/config/config.yaml
        mode: "0600"
      vars:
        headplane_server_host: "{{ _headplane_tailscale_ip.stdout | trim }}"
        headplane_listen_port: "{{ headplane_rebind_port }}"
      when: headplane_enabled | default(true)

    - name: Remove existing headplane container before tailnet rebind
      ansible.builtin.command:
        argv: ["docker", "rm", "-f", "headplane"]
      register: _headplane_rebind_rm
      changed_when: _headplane_rebind_rm.rc == 0
      failed_when: false
      when: headplane_enabled | default(true)

    - name: Run Headplane container on host network after tailnet rebind
      ansible.builtin.command:
        argv:
          - docker
          - run
          - -d
          - --name
          - headplane
          - --restart
          - unless-stopped
          - --network
          - host
          - -v
          - /opt/headplane/config/config.yaml:/etc/headplane/config.yaml:ro
          - -v
          - /opt/headplane/data:/var/lib/headplane
          - -v
          - /opt/headscale/config/config.yaml:/etc/headscale/config.yaml:ro
          - "{{ headplane_rebind_image }}"
      register: _headplane_rebind_run
      changed_when: _headplane_rebind_run.rc == 0
      when: headplane_enabled | default(true)

    - name: Ensure Headplane is listening on the control tailnet IP
      ansible.builtin.wait_for:
        host: "{{ _headplane_tailscale_ip.stdout | trim }}"
        port: "{{ headplane_rebind_port }}"
        timeout: 60
      when: headplane_enabled | default(true)

# After tailscale runs on all hosts, every node has a known Tailscale IP.
# This play re-renders the headscale config with extra_records that point service
# subdomains (grafana.in.X, prometheus.in.X, backrest.in.X) at the right proxy tier:
# - monitoring VM directly in internal-PKI mode
# - gateway VM Tailscale IP in Namecheap wildcard mode
# Then it restarts headscale so the DNS changes are pushed to all tailnet clients.
- name: Headscale service DNS reconcile
  hosts: control
  gather_facts: false
  tags: [headscale, tailscale]
  tasks:
    - name: Build base internal service routes
      ansible.builtin.set_fact:
        internal_service_routes:
          - name: grafana
            upstream_host: monitoring-vm
            upstream_port: 3000
          - name: prometheus
            upstream_host: monitoring-vm
            upstream_port: 9090

    - name: Add backrest internal route when backup is enabled
      ansible.builtin.set_fact:
        internal_service_routes: "{{ internal_service_routes + [{'name': 'backrest', 'upstream_host': 'monitoring-vm', 'upstream_port': 9898}] }}"
      when: backup_enabled | default(false) | bool

    - name: Add service_catalog internal routes
      ansible.builtin.set_fact:
        internal_service_routes: "{{ internal_service_routes + [_route] }}"
      vars:
        _cfg: "{{ item.value | default({}) }}"
        _route:
          name: "{{ _cfg.internal_alias | default(item.key) | trim }}"
          upstream_host: "{{ _cfg.upstream_host | default(item.key ~ '-vm') }}"
          upstream_port: "{{ (_cfg.upstream_port | default(80)) | int }}"
      loop: "{{ service_catalog | default({}) | dict2items }}"
      when:
        - (_cfg.enabled | default(true) | bool)
        - (_cfg.visibility | default('internal')) in ['internal', 'both']
        - (_cfg.internal_alias | default('') | trim) != ''
        - (_cfg.upstream_host | default(item.key ~ '-vm')) in hostvars

    - name: Resolve internal service proxy IP
      ansible.builtin.set_fact:
        _internal_service_proxy_ip: >-
          {{
            (hostvars['gateway-vm']['tailscale_ip'] | default(_tailscale_ip_map.get('gateway-vm', '')))
            if (internal_service_tls_mode | default('internal')) == 'namecheap'
            else (hostvars['monitoring-vm']['tailscale_ip'] | default(_tailscale_ip_map.get('monitoring-vm', '')))
          }}
      vars:
        _tailscale_ip_map: >-
          {{
            (
              lookup('file', tailscale_local_inventory_dir ~ '/tailscale-ips.json', errors='ignore')
              | default('{}', true)
              | from_json
            )
            if (tailscale_local_inventory_dir | default('') | trim) != ''
            else {}
          }}

    - name: Initialize headscale extra DNS records
      ansible.builtin.set_fact:
        headscale_extra_dns_records: []
      when: (headscale_magic_dns_base_domain | default('') | trim) != ''

    - name: Build headscale DNS extra_records from internal service routes
      ansible.builtin.set_fact:
        headscale_extra_dns_records: "{{ headscale_extra_dns_records + [ {'name': item.name ~ '.' ~ headscale_magic_dns_base_domain, 'value': _internal_service_proxy_ip} ] }}"
      loop: "{{ internal_service_routes | default([]) }}"
      when:
        - (headscale_magic_dns_base_domain | default('') | trim) != ''
        - (_internal_service_proxy_ip | default('') | trim) != ''

    - name: Persist compiled service catalog artifact
      ansible.builtin.copy:
        dest: "{{ tailscale_local_inventory_dir }}/service-catalog.json"
        mode: "0644"
        content: >-
          {{
            {
              'schema_version': 1,
              'generated_by': 'ansible/playbooks/site.yml',
              'service_catalog': (service_catalog | default({})),
              'internal_service_routes': (internal_service_routes | default([])),
              'headscale_extra_dns_records': (headscale_extra_dns_records | default([]))
            }
            | to_nice_json
          }}
      delegate_to: localhost
      become: false
      when: (tailscale_local_inventory_dir | default('') | trim) != ''

    - name: Re-render headscale config with service extra_records
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../roles/headscale/templates/headscale-config.yaml.j2"
        dest: /opt/headscale/config/config.yaml
        mode: "0644"
      register: _headscale_dns_config_changed
      when:
        - (headscale_magic_dns_base_domain | default('') | trim) != ''
        - (headscale_extra_dns_records | default([]) | length) > 0

    - name: Restart headscale to push DNS changes to tailnet
      ansible.builtin.command:
        argv: ["docker", "restart", "headscale"]
      when:
        - _headscale_dns_config_changed is defined
        - _headscale_dns_config_changed is changed

- name: Refresh tailnet sessions after Headscale updates
  hosts: all
  gather_facts: false
  tags: [headscale, tailscale]
  tasks:
    - name: Restart tailscaled to refresh peer state after Headscale restarts
      # IMPORTANT: Use nohup+& to fully detach the restart from the SSH session.
      # When the SSH connection is via a Tailscale IP, stopping tailscaled kills the
      # tunnel and the SSH session immediately.  Running the restart in the background
      # lets the SSH session close cleanly while zinit stop/start completes on the VM.
      ansible.builtin.shell: |
        nohup bash -c '
          sleep 1
          timeout 20 zinit stop tailscaled 2>/dev/null || true
          zinit monitor tailscaled 2>/dev/null || true
          timeout 10 zinit start tailscaled 2>/dev/null || true
        ' </dev/null >/dev/null 2>&1 &
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false

    - name: Wait for SSH transport to come back after tailscaled refresh
      # The background restart breaks existing SSH tunnels over the tailnet.
      # Use Ansible's connection-aware probe here so workload nodes reached via
      # ProxyCommand / jump hosts recover correctly as well.
      ansible.builtin.wait_for_connection:
        timeout: 60
        sleep: 3
        connect_timeout: 5

    - name: Wait for tailscale socket after tailscaled refresh
      ansible.builtin.wait_for:
        path: /var/run/tailscale/tailscaled.sock
        timeout: 30

- name: Node exporter (bind to Tailscale)
  hosts: all
  gather_facts: true
  tags: [node_exporter]
  roles:
    - node_exporter

- name: Monitoring stack (Prometheus + Grafana)
  hosts: monitoring
  gather_facts: true
  tags: [monitoring]
  roles:
    - monitoring

- name: Optional workload service roles
  hosts: workloads
  gather_facts: true
  tags: [workloads, services]
  tasks:
    - name: Resolve service catalog entry for this workload
      ansible.builtin.set_fact:
        workload_service_config: "{{ (service_catalog | default({})).get(tf_name | default(''), {}) }}"

    - name: Determine whether this workload service is enabled
      ansible.builtin.set_fact:
        workload_service_enabled: >-
          {{
            (workload_service_config | length) > 0
            and (workload_service_config.enabled | default(true) | bool)
            and (tf_name | default('')) not in ['monitoring']
          }}

    - name: Validate enabled workload runtime profile
      ansible.builtin.assert:
        that:
          - (workload_service_config.runtime | default('ansible')) in ['docker', 'ansible', 'plain']
        fail_msg: "service_catalog.{{ tf_name }}.runtime must be docker, ansible, or plain."
      when: workload_service_enabled | bool

    - name: Check whether workload role exists
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../roles/{{ tf_name }}"
      register: workload_role_path
      delegate_to: localhost
      become: false
      when: workload_service_enabled | bool

    - name: Fail when enabled workload role is missing
      ansible.builtin.fail:
        msg: "service_catalog enables {{ tf_name }}, but ansible/roles/{{ tf_name }} is missing."
      when:
        - workload_service_enabled | bool
        - not (workload_role_path.stat.exists | default(false))

    - name: Run enabled workload service role
      ansible.builtin.include_role:
        name: "{{ tf_name }}"
      when:
        - workload_service_enabled | bool
        - workload_role_path.stat.exists | default(false)

- name: Backup (Restic encrypted backups)
  hosts: all
  gather_facts: true
  tags: [backup]
  roles:
    - backup

- name: Gateway reverse proxy + exit node
  hosts: gateway
  gather_facts: true
  tags: [gateway]
  roles:
    - gateway

- name: Service observability (Alloy + local health checks)
  hosts: all
  gather_facts: true
  tags: [observability]
  roles:
    - observability

- name: Firewall baseline (lock down public SSH)
  hosts: all
  gather_facts: true
  tags: [firewall]
  roles:
    - firewall
