---
# Tailscale client configuration
# headscale_url must be set on control plane role and shared here.

tailscale_login_server: "{{ headscale_url | default('') }}"

# If true, attempt to join tailnet using a Headscale preauth key generated by the control plane role.
tailscale_use_headscale_preauthkeys: true

# Optional override: set a specific auth key (otherwise role picks from headscale_authkeys based on tailscale_tags).
tailscale_authkey: ""

# Restore per-node Tailscale state from backup so rebuilt VMs keep their previous
# tailnet identity. deploy.sh --fresh-tailnet overrides this to false.
tailscale_restore_state: true

# Tags to advertise to Headscale (e.g. ["tag:servers"]). Inventory sets sensible defaults.
tailscale_tags: []

# Extra args for tailscale up
tailscale_extra_args: []

# Gateway-only: advertise as exit node
tailscale_advertise_exit_node: false

# Exit-node route advertisement can take a while to show up in Headscale after
# tailscale up resets or reconnects. Keep the approval poller configurable so
# gateway converges do not fail on slow control-plane propagation.
tailscale_exit_node_route_approval_retries: 60
tailscale_exit_node_route_approval_delay_seconds: 5

# Fixed UDP listen port for inbound Tailscale traffic on hosts with public IPs.
# Keep this pinned and in sync with the firewall role (which carries the same
# fallback because Ansible role defaults are not shared across roles). Allowing
# tailscaled to pick a random high port makes `tailscale status` look healthy
# while new inbound peer sessions from laptops/workstations time out because UFW
# blocks the ephemeral port.
tailscale_udp_port: 41641

# Directory on the Ansible controller where tailscale-ips.json is persisted.
# deploy.sh overrides this to environments/<env>/inventory/ when --env is used.
# Default points to ansible/inventory/ (adjacent to the playbook).
tailscale_local_inventory_dir: "{{ playbook_dir }}/../inventory"
